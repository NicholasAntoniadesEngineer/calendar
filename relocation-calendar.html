<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relocation Calendar &amp; Cash Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b2630;--ink-soft:#5a6b78;--paper:#ffffff;--field:#fcfcfb;
    --line:#dde2e7;--line-strong:#b9c2c9;--weekend:#f5f2ec;
    --accent:#0e6b5e;--accent-soft:#e2f0ec;--today:#b4451f;--debt:#b4451f;--screen-bg:#e9edf0;
    --display:'Fraunces','Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --body:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--body);color:var(--ink);background:var(--screen-bg);-webkit-font-smoothing:antialiased;}
  .tabular{font-variant-numeric:tabular-nums;}

  /* Toolbar */
  .toolbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#eef2f4;padding:14px clamp(16px,4vw,40px);display:flex;flex-wrap:wrap;gap:18px 26px;align-items:center;box-shadow:0 2px 0 rgba(0,0,0,.15);}
  .toolbar .brand{font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:.2px;margin-right:auto;display:flex;align-items:baseline;gap:10px;}
  .toolbar .brand small{font-family:var(--body);font-weight:500;color:#9fb3b0;font-size:12px;letter-spacing:.06em;text-transform:uppercase;}
  .ctl{display:flex;align-items:center;gap:8px;font-size:13px;color:#cdd8da;}
  .ctl label{white-space:nowrap;letter-spacing:.02em;}
  .toolbar select,.toolbar button{font-family:var(--body);font-size:13px;border:1px solid #3a4a55;border-radius:7px;background:#26333d;color:#eef2f4;padding:7px 11px;cursor:pointer;}
  .toolbar select:hover,.toolbar button:hover{border-color:#5d6f7b;}
  .toolbar button.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
  .toolbar button.primary:hover{background:#0c5a4f;}
  .stepper{display:inline-flex;align-items:center;border:1px solid #3a4a55;border-radius:7px;overflow:hidden;}
  .stepper button{border:none;border-radius:0;padding:7px 12px;background:#26333d;}
  .stepper span{padding:0 12px;font-size:13px;color:#eef2f4;white-space:nowrap;min-width:118px;text-align:center;}
  .grand{display:flex;flex-direction:column;line-height:1.15;padding-left:20px;border-left:1px solid #3a4a55;}
  .grand b{font-family:var(--display);font-size:20px;color:#fff;font-weight:600;}
  .grand small{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9fb3b0;}

  .help{max-width:210mm;margin:18px auto 0;padding:0 6px;color:var(--ink-soft);font-size:13px;line-height:1.5;}
  .help b{color:var(--ink);font-weight:600;}

  /* Sheets — each at least one A4 page */
  #calendar{padding:18px 0 8px;}
  .sheet{width:210mm;background:var(--paper);margin:18px auto;padding:13mm 13mm 11mm;box-shadow:0 6px 30px rgba(27,38,48,.16);display:flex;flex-direction:column;}
  .sheet.fixed{height:297mm;overflow:hidden;}      /* summary + month: exactly one page */
  .sheet.flow{min-height:297mm;}                    /* todo: grows, paginates on print */
  .sheet.fixed.month{width:297mm;height:210mm;}    /* months: A4 landscape */
  /* Month pages: tighter chrome so the grid gets more room */
  .sheet.month{padding:0;}
  .month-rot{display:flex;flex-direction:column;width:100%;height:100%;min-height:0;padding:8mm 11mm 7mm;}
  .sheet.month .sheet-head{padding-bottom:5px;gap:14px;}
  .sheet.month .sheet-head h2{font-size:24px;margin:1px 0 0;}
  .sheet.month .sheet-head .eyebrow{font-size:10px;letter-spacing:.18em;}
  .sheet.month .cal{margin-top:5px;}
  .sheet.month .cal-week span{padding:2px 5px;font-size:9px;}
  .sheet.month .month-foot{margin-top:5px;}
  .sheet.month .cards-due{padding:5px 10px 5px;}
  .sheet.month .cards-due .cd-title{font-size:12px;margin-bottom:1px;}
  .sheet.month .cd-colhead{padding:0 2px 1px;}
  .sheet.month .cd-add{margin-top:3px;padding:3px 9px;}
  .sheet.month .totals .box{padding:4px 14px;}
  .sheet.month .totals .box b{font-size:16px;}
  .sheet-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;border-bottom:2px solid var(--ink);padding-bottom:10px;flex:0 0 auto;}
  .sheet-head .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .sheet-head h2{font-family:var(--display);font-weight:600;font-size:34px;line-height:1;margin:4px 0 0;}
  .sheet-head h2 span{color:var(--ink-soft);font-weight:400;}
  .sheet-title-doc{font-family:var(--display);font-size:15px;color:var(--ink);text-align:right;max-width:70mm;font-weight:500;outline:none;min-width:30mm;}
  .sheet-title-doc:empty::before{content:attr(data-ph);color:#c2cbd2;}

  /* ---- Financial summary page ---- */
  .summary-intro{font-size:13px;color:var(--ink-soft);margin:12px 0 4px;line-height:1.5;flex:0 0 auto;}
  .sum-date{outline:none;border-bottom:1px dotted var(--line-strong);color:var(--ink);font-weight:600;}
  .sum-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7mm;margin-top:7mm;flex:1 1 auto;align-content:start;min-width:0;}
  .panel{display:flex;flex-direction:column;min-width:0;}
  .panel h3{font-family:var(--display);font-size:16px;font-weight:600;margin:0 0 2px;}
  .panel.debt h3{color:var(--debt);}
  .panel .sub{font-size:10px;color:var(--ink-soft);margin-bottom:8px;min-height:26px;}
  .lrow{display:flex;align-items:center;gap:4px;padding:4px 0;border-bottom:1px solid var(--line);min-width:0;}
  .lrow .lname{flex:1 1 auto;width:0;min-width:0;border:none;background:transparent;font-family:var(--body);font-size:12px;color:var(--ink);outline:none;padding:2px;}
  .lrow .lname::placeholder{color:#bcc6cd;}
  .lrow .lamt{flex:0 0 64px;width:64px;border:none;background:transparent;font-family:var(--body);font-size:12px;font-weight:600;color:var(--accent);text-align:right;outline:none;padding:2px 0;-moz-appearance:textfield;}
  .panel.debt .lrow .lamt{color:var(--debt);}
  .lrow .lamt::-webkit-outer-spin-button,.lrow .lamt::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .lrow .lamt::placeholder{color:#cdd6d3;font-weight:400;}
  .lrow:focus-within{background:#fffdf5;}
  .ldel{flex:0 0 auto;border:none;background:transparent;color:#c4ccd2;cursor:pointer;font-size:14px;line-height:1;padding:0 1px;}
  .ldel:hover{color:var(--today);}
  .ladd{align-self:flex-start;margin-top:8px;border:1px dashed var(--line-strong);background:#fff;color:var(--accent);border-radius:7px;font-size:11px;font-weight:600;padding:5px 10px;cursor:pointer;}
  .ladd:hover{border-color:var(--accent);background:var(--accent-soft);}
  .lsub{display:flex;justify-content:space-between;align-items:baseline;gap:6px;margin-top:10px;padding-top:7px;border-top:2px solid var(--ink);}
  .lsub small{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .lsub b{font-family:var(--display);font-size:17px;font-weight:600;white-space:nowrap;}
  .panel.debt .lsub b{color:var(--debt);}

  /* Relocation budget band */
  .reimb{margin-top:7mm;border:1px solid var(--line-strong);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;flex:0 0 auto;}
  .reimb .rb-tag{font-family:var(--display);font-size:15px;font-weight:600;}
  .reimb .rb-tag small{display:block;font-family:var(--body);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .reimb .rb-fixed{font-family:var(--display);font-size:18px;font-weight:600;display:flex;align-items:baseline;gap:4px;}
  .reimb .rb-cur{width:46px;border:1px solid var(--line);border-radius:6px;background:#fff;font-family:var(--body);font-size:13px;font-weight:600;text-transform:uppercase;text-align:center;padding:3px 4px;outline:none;}
  .reimb .rb-amt{width:104px;border:1px solid var(--line);border-radius:6px;background:#fff;font-family:var(--display);font-size:17px;font-weight:600;text-align:right;padding:2px 6px;outline:none;-moz-appearance:textfield;}
  .reimb .rb-amt::-webkit-outer-spin-button,.reimb .rb-amt::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .reimb .rb-cur:focus,.reimb .rb-amt:focus{border-color:var(--accent);}
  .reimb .rb-rate{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-soft);}
  .reimb .rb-rate input{width:62px;border:1px solid var(--line);border-radius:6px;background:#fff;font-family:var(--body);font-size:11px;text-align:right;padding:3px 5px;outline:none;-moz-appearance:textfield;}
  .reimb .rb-rate input:focus{border-color:var(--accent);}
  .reimb .rb-eur{margin-left:auto;text-align:right;}
  .reimb .rb-eur b{font-family:var(--display);font-size:20px;font-weight:600;color:var(--accent);}
  .reimb .rb-eur small{display:block;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .reimb-note{flex:0 0 100%;font-size:10px;color:var(--ink-soft);margin-top:2px;}

  .headroom{margin-top:7mm;display:flex;border:1.5px solid var(--ink);border-radius:9px;overflow:hidden;flex:0 0 auto;}
  .headroom .hbox{flex:1;padding:10px 12px;min-width:0;}
  .headroom .hbox+.hbox{border-left:1px solid var(--line-strong);}
  .headroom .hbox.accent{background:var(--accent);}
  .headroom .hbox small{display:block;font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;line-height:1.3;}
  .headroom .hbox.accent small{color:#cfe7e0;}
  .headroom .hbox b{font-family:var(--display);font-size:18px;font-weight:600;white-space:nowrap;}
  .headroom .hbox.debt b{color:var(--debt);}
  .headroom .hbox.accent b{color:#fff;}

  /* ---- To-do page ---- */
  .todo-intro{font-size:13px;color:var(--ink-soft);margin:12px 0 2px;line-height:1.5;}
  .todo-wrap{margin-top:6mm;column-count:2;column-gap:9mm;}
  .tsection{break-inside:avoid;margin:0 0 7mm;border:1px solid var(--line);border-radius:9px;overflow:hidden;display:inline-block;width:100%;}
  .tsec-head{display:flex;align-items:center;gap:8px;background:#f3f6f5;border-bottom:1px solid var(--line);padding:7px 10px;}
  .tsec-head .tnum{font-family:var(--display);font-size:13px;font-weight:700;color:var(--accent);}
  .tsec-title{flex:1;min-width:0;font-family:var(--display);font-size:15px;font-weight:600;color:var(--ink);border:none;background:transparent;outline:none;padding:1px 2px;}
  .tsec-title:focus{background:#fffdf5;}
  .tsec-del{border:none;background:transparent;color:#c4ccd2;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;}
  .tsec-del:hover{color:var(--today);}
  .tsec-del.armed{color:#fff;background:var(--today);border-radius:5px;font-size:10px;font-weight:700;padding:2px 6px;letter-spacing:.04em;}
  .titems{padding:5px 8px 8px;}
  .titem{display:flex;align-items:flex-start;gap:7px;padding:3px 0;border-bottom:1px solid #eef1f3;}
  .titem:last-child{border-bottom:none;}
  .drag{flex:0 0 auto;cursor:grab;color:#cdd6db;font-size:12px;line-height:1.2;letter-spacing:-2px;user-select:none;padding:1px 1px 0;align-self:center;}
  .drag:hover{color:var(--accent);}
  .drag:active{cursor:grabbing;}
  .titem.dragging,.tsection.dragging{opacity:.4;}
  .titem.drop-before{box-shadow:inset 0 2px 0 var(--accent);}
  .titem.drop-after{box-shadow:inset 0 -2px 0 var(--accent);}
  .tsection.drop-before{box-shadow:inset 0 3px 0 var(--accent);}
  .tsection.drop-after{box-shadow:inset 0 -3px 0 var(--accent);}
  .sec-drag{align-self:center;color:#b3c0c4;}
  .tbox{flex:0 0 auto;width:15px;height:15px;margin-top:1px;border:1.6px solid var(--line-strong);border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .tbox.done{background:var(--accent);border-color:var(--accent);}
  .tbox.done::after{content:"\2713";color:#fff;font-size:10px;font-weight:700;line-height:1;}
  .ttext{flex:1;min-width:0;font-size:12px;line-height:1.35;color:var(--ink);border:none;background:transparent;outline:none;padding:1px 2px;word-break:break-word;}
  .ttext:focus{background:#fffdf5;}
  .titem.done .ttext{color:#9aa7af;text-decoration:line-through;}
  .titem-del{flex:0 0 auto;border:none;background:transparent;color:#cfd6db;cursor:pointer;font-size:13px;line-height:1;padding:0 1px;}
  .titem-del:hover{color:var(--today);}
  .titem-add{margin-top:5px;border:none;background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;padding:2px;}
  .titem-add:hover{text-decoration:underline;}
  .tsec-add{display:block;width:100%;margin-top:2mm;border:1px dashed var(--line-strong);background:#fff;color:var(--accent);border-radius:9px;font-size:12.5px;font-weight:600;padding:9px;cursor:pointer;break-inside:avoid;}
  .tsec-add:hover{border-color:var(--accent);background:var(--accent-soft);}
  /* JS-paginated print pages for the to-do */
  .todo-print-cols{display:flex;gap:9mm;margin-top:6mm;}
  .todo-print-col{flex:1;min-width:0;}
  .todo-print-col .tsection{display:block;width:100%;margin:0 0 7mm;}
  .todo-cont-head{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;border-bottom:2px solid var(--ink);padding-bottom:8px;flex:0 0 auto;}
  .todo-page.editing{overflow:visible;}

  /* ---- Calendar grid ---- */
  .cal{flex:1 1 auto;display:flex;flex-direction:column;margin-top:9px;min-height:0;}
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--line-strong);flex:0 0 auto;}
  .cal-week span{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:4px 5px;}
  .cal-week span.we{color:#9a7b56;}
  .cal-grid{flex:1 1 auto;display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;border-left:1px solid var(--line);border-top:1px solid var(--line);min-height:0;}
  .gcell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;flex-direction:column;padding:3px 4px 0;position:relative;min-height:0;overflow:hidden;}
  .gcell.we{background:var(--weekend);}
  .gcell.pad{background:repeating-linear-gradient(135deg,#fafafa,#fafafa 6px,#f3f3f1 6px,#f3f3f1 7px);}
  .gcell .dnum{font-family:var(--display);font-size:14px;font-weight:600;color:var(--ink);line-height:1;flex:0 0 auto;}
  .gcell.today .dnum{color:var(--today);}
  .gcell.today::after{content:"today";position:absolute;top:4px;right:5px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--today);font-weight:700;}
  .items{display:flex;flex-direction:column;gap:1px;margin:3px 0 1px;flex:0 1 auto;min-height:0;overflow:hidden;}
  .item{display:flex;align-items:flex-start;gap:2px;}
  .item::before{content:"\2022";flex:0 0 auto;color:var(--accent);font-size:11px;line-height:1.25;padding-top:1px;}
  .it-label{flex:1;min-width:0;border:none;background:transparent;font-family:var(--body);font-size:10.5px;line-height:1.25;color:var(--ink);outline:none;padding:1px 1px;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;}
  .it-label:empty::before{content:"add item";color:#bcc6cd;}
  .it-label:focus,.it-amt:focus{background:#fffdf5;}
  .it-amt{width:40px;border:none;background:transparent;font-family:var(--body);font-size:10.5px;font-weight:600;color:var(--accent);text-align:right;outline:none;padding:1px 0;-moz-appearance:textfield;flex:0 0 auto;}
  .it-amt::-webkit-outer-spin-button,.it-amt::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .it-amt::placeholder{color:#cdd6d3;font-weight:400;}
  .it-del{border:none;background:transparent;color:#c4ccd2;cursor:pointer;font-size:12px;line-height:1;padding:0 1px;}
  .it-del:hover{color:var(--today);}
  .day-foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:4px;padding:1px 0 2px;flex:0 0 auto;}
  .additem{border:none;background:transparent;color:#9fb3b0;cursor:pointer;font-size:12px;font-weight:700;line-height:1;padding:0 3px;border-radius:3px;}
  .additem:hover{color:var(--accent);background:var(--accent-soft);}
  .daytotal{font-size:10.5px;font-weight:700;color:var(--ink);border-top:1px solid var(--line-strong);padding-left:4px;}
  .daytotal:empty{display:none;border:none;}

  /* ---- Month footer ---- */
  .month-foot{flex:0 0 auto;margin-top:9px;display:flex;gap:10px;align-items:stretch;}
  .cards-due{flex:1 1 auto;border:1px solid var(--line-strong);border-radius:9px;padding:8px 12px 7px;display:flex;flex-direction:column;min-width:0;}
  .cards-due .cd-title{font-family:var(--display);font-size:14px;font-weight:600;margin-bottom:3px;display:flex;align-items:baseline;justify-content:space-between;}
  .cards-due .cd-title small{font-family:var(--body);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .cd-colhead{display:flex;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:0 2px 2px;border-bottom:1px solid var(--line);}
  .cd-colhead .c1{flex:1;} .cd-colhead .c2{width:64px;} .cd-colhead .c3{width:78px;text-align:right;}
  .cd-list{display:flex;flex-direction:column;}
  .cd-row{display:flex;align-items:center;gap:6px;padding:2px 0;border-bottom:1px solid var(--line);}
  .cd-row input{border:none;background:transparent;font-family:var(--body);font-size:11.5px;color:var(--ink);outline:none;padding:2px;}
  .cd-row .cd-card{flex:1;min-width:0;}
  .cd-row .cd-due{width:64px;color:var(--ink-soft);}
  .cd-row .cd-amt{width:78px;text-align:right;font-weight:600;color:var(--debt);-moz-appearance:textfield;}
  .cd-row .cd-amt::-webkit-outer-spin-button,.cd-row .cd-amt::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .cd-row input::placeholder{color:#c4cdc9;}
  .cd-row:focus-within{background:#fffdf5;}
  .cd-del{border:none;background:transparent;color:#c4ccd2;cursor:pointer;font-size:14px;line-height:1;padding:0 2px;}
  .cd-del:hover{color:var(--today);}
  .cd-add{align-self:flex-start;margin-top:6px;border:1px dashed var(--line-strong);background:#fff;color:var(--accent);border-radius:7px;font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;}
  .cd-add:hover{border-color:var(--accent);background:var(--accent-soft);}
  .totals{display:flex;flex-direction:column;border:1.5px solid var(--ink);border-radius:9px;overflow:hidden;flex:0 0 auto;min-width:52mm;}
  .totals .box{padding:7px 16px;text-align:right;flex:1;display:flex;flex-direction:column;justify-content:center;}
  .totals .box+.box{border-top:1px solid var(--line-strong);}
  .totals .box.accent{background:var(--accent);}
  .totals .box small{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .totals .box.accent small{color:#cfe7e0;}
  .totals .box b{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);}
  .totals .box.accent b{color:#fff;}

  .add-month-wrap{max-width:210mm;margin:6px auto 50px;display:flex;justify-content:center;}
  #addMonth{font-family:var(--body);font-size:14px;font-weight:600;color:#fff;background:var(--accent);border:none;border-radius:9px;padding:12px 26px;cursor:pointer;box-shadow:0 4px 14px rgba(14,107,94,.3);}
  #addMonth:hover{background:#0c5a4f;}
  #addMonth small{font-weight:500;opacity:.85;}

  @page{size:A4 portrait;margin:0;}
  @media print{
    body{background:#fff;}
    .toolbar,.help,.add-month-wrap,.no-print{display:none !important;}
    #calendar{padding:0;}
    .sheet{margin:0;box-shadow:none;width:210mm;break-before:page;page-break-before:always;}
    #calendar>.sheet:first-child{break-before:auto;page-break-before:auto;}
    .sheet.fixed{height:290mm;}
    .sheet.flow{min-height:290mm;}
    /* Months: portrait A4 paper, content rotated so it prints landscape */
    .sheet.fixed.month{width:210mm;height:290mm;padding:0;position:relative;overflow:hidden;}
    .sheet.month .month-rot{position:absolute;top:0;left:210mm;width:290mm;height:210mm;transform-origin:top left;transform:rotate(90deg);}
    .tsection,.titem,.tsec-add{break-inside:avoid;}
    .todo-page.editing{overflow:hidden;}
    .it-label:focus,.it-amt:focus,.cd-row:focus-within,.lrow:focus-within{background:transparent;}
    .sheet-title-doc:empty::before{content:"" !important;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
  @media screen and (max-width:880px){
    .sheet{width:100%;padding:18px 14px 22px;}
    .sheet.fixed{height:auto;overflow:visible;}
    .sheet.fixed.month{width:100%;height:auto;}
    .sheet-head h2{font-size:26px;}
    .sum-cols{grid-template-columns:1fr;gap:6mm;}
    .todo-print-cols{flex-direction:column;gap:0;}
    .sheet.todo-page{height:auto;overflow:visible;}
    .cal-grid{grid-auto-rows:minmax(70px,auto);}
    .month-foot{flex-direction:column;}
    .reimb .rb-eur{margin-left:0;}
  }
</style>
</head>
<body>

  <div class="ctl">
    <label>Currency</label>

      <option value="EUR">&euro; EUR</option><option value="GBP">&pound; GBP</option>
      <option value="USD">$ USD</option><option value="CHF">CHF</option>
      <option value="CAD">$ CAD</option><option value="AUD">$ AUD</option>
      <option value="SEK">SEK</option><option value="NOK">NOK</option>
      <option value="DKK">DKK</option><option value="PLN">PLN</option>

</div>



<div id="calendar"></div>

<div class="add-month-wrap no-print">
  <button id="addMonth">+ Add month <small id="addMonthLabel"></small></button>
</div>

<script>
(function(){
  "use strict";
  var WEEK=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var today=new Date();
  var todayKey=iso(today.getFullYear(),today.getMonth(),today.getDate());

  var PANELS={
    banks:{title:'Liquid cash',sub:'Cash sitting in each account right now',ph:'Account name',subLabel:'Total liquid cash',totalAttr:'data-bankstotal'},
    credit:{title:'Credit available',sub:'Headroom left on each card or credit line',ph:'Card / credit line',subLabel:'Total credit available',totalAttr:'data-credittotal'},
    owed:{title:'Owed on credit cards',sub:'Balance outstanding on each card now',ph:'Card name',subLabel:'Total owed',totalAttr:'data-owedtotal',debt:true}
  };

  var DEFAULT_TODO=[
    {title:'Offer & employment',items:[
      'Confirm KATIM relocation support: flights, shipping, housing, visa costs',

    ]},
    {title:'UAE arrival & setup',items:[
      'Plan movers',
      'Start looking at accommodation',
      'Open UAE bank accounts',
      'Car hire',
      'Planning finance',
      'UAE work visa',
      'Spouse dependen visa',
      'Attest marriage certificates',
      'Lara tourist visa health insurance',
      'Driving licence conversion (SA → UAE)',
      'Attest degree certificates',
      'Attest birth certificates',
      'UAE medical',
      'UAE Emirates ID'
    ]},
    {title:'Austria exit admin',items:[
      'De-register residence (Abmeldung) at Meldeamt',
      'Cancel electricity',
      'Cancel internet / phone',
      'Cancel insurance',
      'Cancel travel cards',
      'Handle Austrian lease: notice, deposit return, handover',

    ]},
    {title:'Banking & cards',items:[
      'Move all accounts to Standard Bank',
      'Lara Standard Bank App connect',
      'Cancel Amex',
      'Cancel Monzo',
      'Notify card providers of address change / pay down before move'
    ]},
    {title:'Retirement & investments',items:[
      'UK withdraw pension',
      'EU withdraw pension'
    ]},
    {title:'Shipping & logistics',items:[
      'Get moving quotes (Vienna → Abu Dhabi)',
      'Book flights to South Africa',
      'Reference previous moving lists (UK → Austria)'
    ]},
    {title:'Austria flat',items:[
      'Fix window',
      'White paint',
      'Order boxes and packaging'
    ]},
    {title:'Lynne Europe Holiday',items:[
      'Holiday Plan',
      'Airbnb',
      'Transport costs'
    ]}
  ];

  var state={
    start:{y:today.getFullYear(),m:today.getMonth()},
    count:5,currency:'EUR',docTitle:'',
    summaryDate: today.getDate()+' '+MN[today.getMonth()]+' '+today.getFullYear(),
    banks:[{name:'',amount:null}],
    credit:[{name:'',amount:null}],
    owed:[{name:'',amount:null}],
    reimbAED:30000, reimbRate:0.2374, reimbCur:'AED',
    todo:JSON.parse(JSON.stringify(DEFAULT_TODO)).map(function(s){return {title:s.title,items:s.items.map(function(t){return {text:t,done:false};})};}),
    store:{},
    cardsDue:{}
  };
  var rendered=[];

  function pad(n){return (n<10?'0':'')+n;}
  function iso(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
  function ymKey(y,m){return y+'-'+pad(m+1);}
  function rec(key){var e=state.store[key];if(!e){e={items:[]};state.store[key]=e;}if(!e.items)e.items=[];return e;}
  function dayItems(key){var e=state.store[key];return (e&&e.items)?e.items:[];}
  function daySum(key){return dayItems(key).reduce(function(s,it){var a=it.amount;return s+((a!=null&&!isNaN(a))?a:0);},0);}
  function hasPriced(key){return dayItems(key).some(function(it){return it.amount!=null&&!isNaN(it.amount);});}
  function cardsArr(ym){if(!state.cardsDue[ym])state.cardsDue[ym]=[];return state.cardsDue[ym];}
  function cardsSum(ym){return cardsArr(ym).reduce(function(s,it){var a=it.amount;return s+((a!=null&&!isNaN(a))?a:0);},0);}
  function listSum(arr){return arr.reduce(function(s,it){var a=it.amount;return s+((a!=null&&!isNaN(a))?a:0);},0);}

  function fmt(v){if(v==null||isNaN(v))v=0;try{return new Intl.NumberFormat(undefined,{style:'currency',currency:state.currency,maximumFractionDigits:0}).format(v);}catch(e){return state.currency+' '+Math.round(v).toLocaleString();}}
  function fmtEUR(v){if(v==null||isNaN(v))v=0;try{return new Intl.NumberFormat(undefined,{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);}catch(e){return '\u20ac'+Math.round(v).toLocaleString();}}
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function escA(s){return esc(s).replace(/'/g,'&#39;');}
  function valNum(v){return (v!=null&&!isNaN(v))?v:'';}

  /* ---------- render ---------- */
  function render(){
    rendered=[];
    var root=document.getElementById('calendar');root.innerHTML='';
    var lastM=(state.start.m+state.count-1)%12,lastY=state.start.y+Math.floor((state.start.m+state.count-1)/12);
    document.getElementById('rangeLabel').textContent=MN[state.start.m].slice(0,3)+' '+state.start.y+' \u2013 '+MN[lastM].slice(0,3)+' '+lastY;
    document.getElementById('grandLabel').textContent='Total cash, '+state.count+' months';
    document.getElementById('addMonthLabel').textContent='('+MN[(state.start.m+state.count)%12].slice(0,3)+' '+(state.start.y+Math.floor((state.start.m+state.count)/12))+')';

    root.appendChild(buildSummary());
    var region=document.createElement('div');region.id='todoRegion';root.appendChild(region);
    for(var i=0;i<state.count;i++){
      var m=(state.start.m+i)%12,y=state.start.y+Math.floor((state.start.m+i)/12);
      rendered.push({y:y,m:m});
      root.appendChild(buildSheet(y,m,i));
    }
    recalcSummary();recalc();
    lastTodoSig=null;paginateTodo(true);
  }

  /* ---------- financial summary page ---------- */
  function lrowHtml(kind,idx,it){
    return '<div class="lrow">'+
      '<input class="lname" data-list="'+kind+'" data-idx="'+idx+'" placeholder="'+PANELS[kind].ph+'" value="'+escA(it.name||'')+'">'+
      '<input class="lamt tabular" type="number" inputmode="decimal" step="any" data-list="'+kind+'" data-idx="'+idx+'" placeholder="0" value="'+valNum(it.amount)+'">'+
      '<button class="ldel no-print" data-list="'+kind+'" data-idx="'+idx+'" title="Remove">\u00d7</button>'+
    '</div>';
  }
  function panelHtml(kind){
    var cfg=PANELS[kind],arr=state[kind],rows='';
    for(var i=0;i<arr.length;i++)rows+=lrowHtml(kind,i,arr[i]);
    return '<div class="panel'+(cfg.debt?' debt':'')+'">'+
      '<h3>'+cfg.title+'</h3><div class="sub">'+cfg.sub+'</div>'+
      '<div class="llist" data-list="'+kind+'">'+rows+'</div>'+
      '<button class="ladd no-print" data-list="'+kind+'">+ add row</button>'+
      '<div class="lsub"><small>'+cfg.subLabel+'</small><b class="tabular" '+cfg.totalAttr+'>&mdash;</b></div>'+
    '</div>';
  }
  function buildSummary(){
    var s=document.createElement('section');s.className='sheet fixed';
    s.innerHTML=
      '<div class="sheet-head"><div>'+
        '<div class="eyebrow">Starting position</div>'+
        '<h2>Balances &amp; credit</h2></div>'+
      '</div>'+
      '<div class="summary-intro">As of <span class="sum-date" contenteditable="true" spellcheck="false" data-sumdate>'+esc(state.summaryDate)+'</span> &mdash; your cash on hand, credit you can draw on, and what you already owe.</div>'+
      '<div class="sum-cols">'+panelHtml('banks')+panelHtml('credit')+panelHtml('owed')+'</div>'+
      '<div class="reimb">'+
        '<div class="rb-tag">Relocation budget<small>Reimbursement &middot; editable</small></div>'+
        '<div class="rb-fixed"><input class="rb-cur" data-reimb-cur value="'+escA(state.reimbCur)+'" maxlength="4" spellcheck="false"> <input class="rb-amt tabular" type="number" step="any" inputmode="decimal" data-reimb-amt value="'+valNum(state.reimbAED)+'"></div>'+
        '<div class="rb-rate">&times; <input type="number" step="0.0001" inputmode="decimal" data-reimb-rate value="'+state.reimbRate+'"> <span data-reimb-pair>'+esc(state.reimbCur)+'&rarr;EUR</span></div>'+
        '<div class="rb-eur"><b class="tabular" data-reimb-eur>&mdash;</b><small>Reimbursement in EUR</small></div>'+
      '</div>'+
      '<div class="headroom">'+
        '<div class="hbox"><small>Liquid cash</small><b class="tabular" data-liquid>&mdash;</b></div>'+
        '<div class="hbox"><small>Credit available</small><b class="tabular" data-credavail>&mdash;</b></div>'+
        '<div class="hbox debt"><small>Owed on cards</small><b class="tabular" data-owed>&mdash;</b></div>'+
        '<div class="hbox"><small>Net cash<br>(cash &minus; owed)</small><b class="tabular" data-netcash>&mdash;</b></div>'+
        '<div class="hbox accent"><small>Spending power<br>(cash + credit)</small><b class="tabular" data-spend>&mdash;</b></div>'+
      '</div>';
    return s;
  }
  function rerenderList(kind){
    var el=document.querySelector('.llist[data-list="'+kind+'"]');if(!el)return;
    var arr=state[kind],rows='';for(var i=0;i<arr.length;i++)rows+=lrowHtml(kind,i,arr[i]);el.innerHTML=rows;
  }
  function setSel(sel,t){var el=document.querySelector(sel);if(el)el.textContent=t;}
  function recalcReimb(){var amt=(state.reimbAED!=null&&!isNaN(state.reimbAED))?state.reimbAED:0;setSel('[data-reimb-eur]',fmtEUR(amt*state.reimbRate));}
  function recalcSummary(){
    var b=listSum(state.banks),c=listSum(state.credit),o=listSum(state.owed);
    setSel('[data-bankstotal]',fmt(b));setSel('[data-credittotal]',fmt(c));setSel('[data-owedtotal]',fmt(o));
    setSel('[data-liquid]',fmt(b));setSel('[data-credavail]',fmt(c));setSel('[data-owed]',fmt(o));
    setSel('[data-netcash]',fmt(b-o));setSel('[data-spend]',fmt(b+c));
    recalcReimb();
  }

  /* ---------- to-do page ---------- */
  function titemHtml(si,ii,it){
    return '<div class="titem'+(it.done?' done':'')+'" data-si="'+si+'" data-ii="'+ii+'">'+
      '<span class="drag no-print" title="Drag to reorder">\u22ee\u22ee</span>'+
      '<div class="tbox'+(it.done?' done':'')+'" data-si="'+si+'" data-ii="'+ii+'" role="checkbox"></div>'+
      '<div class="ttext" contenteditable="true" spellcheck="false" data-si="'+si+'" data-ii="'+ii+'">'+esc(it.text)+'</div>'+
      '<button class="titem-del no-print" data-si="'+si+'" data-ii="'+ii+'" title="Remove">\u00d7</button>'+
    '</div>';
  }
  function sectionHtml(si,sec){
    var its='';for(var i=0;i<sec.items.length;i++)its+=titemHtml(si,i,sec.items[i]);
    return '<div class="tsection" data-si="'+si+'">'+
      '<div class="tsec-head" data-si="'+si+'"><span class="drag sec-drag no-print" title="Drag section">\u22ee\u22ee</span><span class="tnum">'+pad(si+1)+'</span>'+
        '<input class="tsec-title" data-si="'+si+'" value="'+escA(sec.title)+'" placeholder="Section name">'+
        '<button class="tsec-del no-print" data-si="'+si+'" title="Delete section">\u00d7</button></div>'+
      '<div class="titems" data-si="'+si+'">'+its+
        '<button class="titem-add no-print" data-si="'+si+'">+ add item</button>'+
      '</div>'+
    '</div>';
  }
  function firstHeadHTML(){
    return '<div class="sheet-head"><div><div class="eyebrow">Action plan</div>'+
        '<h2>To-do</h2></div></div>'+
      '<div class="todo-intro">Tick items as you go, edit any text, drag rows or sections by their handle to reorder, and add your own. This view matches the printed pages.</div>';
  }

  /* ---------- to-do pagination (screen + print identical) ---------- */
  var lastTodoSig=null, todoTimer=null;
  function computeTodoPages(){
    var probe=document.createElement('div');probe.style.cssText='position:absolute;visibility:hidden;height:100mm;';document.body.appendChild(probe);
    var pxPerMm=probe.getBoundingClientRect().height/100;document.body.removeChild(probe);
    var colWpx=87.5*pxPerMm, gapPx=7*pxPerMm, pageInner=(290-13-11)*pxPerMm;
    // measure head+intro at full content width
    var hostF=document.createElement('div');hostF.style.cssText='position:absolute;left:-9999px;top:0;width:'+(184*pxPerMm)+'px;';hostF.innerHTML=firstHeadHTML();document.body.appendChild(hostF);
    var headIntroH=hostF.getBoundingClientRect().height;document.body.removeChild(hostF);
    var firstCap=pageInner-headIntroH-6*pxPerMm, contCap=pageInner-16*pxPerMm;
    // measure each section at column width (matches on-screen, handles/buttons visible)
    var host=document.createElement('div');host.style.cssText='position:absolute;left:-9999px;top:0;width:'+colWpx+'px;';document.body.appendChild(host);
    var st=document.createElement('style');st.textContent='#__m .tsection{display:block;width:100%;margin:0;}';host.id='__m';document.head.appendChild(st);
    var heights=[];
    for(var i=0;i<state.todo.length;i++){host.innerHTML=sectionHtml(i,state.todo[i]);heights.push(host.firstChild.getBoundingClientRect().height+gapPx);}
    document.body.removeChild(host);document.head.removeChild(st);
    // packing: place each section in whichever column is currently shorter,
    // so short sections fill gaps instead of bumping to a new page.
    var pages=[],cols=[[],[]],used=[0,0],cap=firstCap,first=true;
    function pushPage(){pages.push({first:first,cols:cols});first=false;cols=[[],[]];used=[0,0];cap=contCap;}
    for(var s=0;s<heights.length;s++){
      var h=heights[s];
      var ci=used[0]<=used[1]?0:1;           // shorter column first
      if(used[ci]+h>cap){                    // doesn't fit there
        var other=ci===0?1:0;
        if(used[other]+h<=cap){ci=other;}    // try the taller column
        else if(cols[0].length||cols[1].length){pushPage();ci=used[0]<=used[1]?0:1;} // else new page
      }
      cols[ci].push(s);used[ci]+=h;
    }
    if(cols[0].length||cols[1].length)pages.push({first:first,cols:cols});
    if(!pages.length)pages.push({first:true,cols:[[],[]]});
    return pages;
  }
  function todoSig(pages){return pages.map(function(pg){return pg.cols[0].join(',')+'|'+pg.cols[1].join(',');}).join(';');}
  function saveTodoCaret(){
    var a=document.activeElement;if(!a||!a.classList)return null;
    if(a.classList.contains('ttext')){var off=0;try{off=window.getSelection().anchorOffset;}catch(e){}return {type:'ttext',si:a.dataset.si,ii:a.dataset.ii,off:off};}
    if(a.classList.contains('tsec-title')){return {type:'title',si:a.dataset.si,off:a.selectionStart};}
    return null;
  }
  function restoreTodoCaret(s){
    if(!s)return;
    if(s.type==='ttext'){var el=document.querySelector('.ttext[data-si="'+s.si+'"][data-ii="'+s.ii+'"]');if(el){el.focus();try{var node=el.firstChild||el,len=(node.textContent||'').length,r=document.createRange(),sel=window.getSelection();r.setStart(node,Math.min(s.off,len));r.collapse(true);sel.removeAllRanges();sel.addRange(r);}catch(e){}}}
    else{var el2=document.querySelector('.tsec-title[data-si="'+s.si+'"]');if(el2){el2.focus();try{el2.setSelectionRange(s.off,s.off);}catch(e){}}}
  }
  function buildTodoPage(pg,idx,total){
    var sheet=document.createElement('section');sheet.className='sheet fixed todo-page';
    function colHTML(arr){var o='';arr.forEach(function(si){o+=sectionHtml(si,state.todo[si]);});return o;}
    var head=pg.first?firstHeadHTML():'<div class="todo-cont-head">To-do &mdash; continued ('+(idx+1)+' of '+total+')</div>';
    sheet.innerHTML=head+'<div class="todo-print-cols"><div class="todo-print-col">'+colHTML(pg.cols[0])+'</div><div class="todo-print-col">'+colHTML(pg.cols[1])+'</div></div>';
    return sheet;
  }
  function paginateTodo(force){
    var region=document.getElementById('todoRegion');if(!region)return;
    var pages=computeTodoPages(),sig=todoSig(pages);
    if(!force&&sig===lastTodoSig)return;   // breaks unchanged — leave DOM (and caret) alone
    lastTodoSig=sig;
    var saved=saveTodoCaret();
    region.innerHTML='';
    pages.forEach(function(pg,idx){region.appendChild(buildTodoPage(pg,idx,pages.length));});
    var add=document.createElement('button');add.className='tsec-add no-print';add.id='addSection';add.innerHTML='+ Add section';region.appendChild(add);
    restoreTodoCaret(saved);
  }
  function scheduleTodo(){clearTimeout(todoTimer);todoTimer=setTimeout(function(){paginateTodo(false);},140);}

  /* ---------- drag & drop reorder ---------- */
  var drag=null; // {kind:'item'|'section', si, ii}
  function clearDropMarks(){
    document.querySelectorAll('.drop-before,.drop-after').forEach(function(el){el.classList.remove('drop-before','drop-after');});
  }
  // Only enable HTML5 drag when the user presses a drag handle
  document.getElementById('calendar').addEventListener('pointerdown',function(ev){
    var h=ev.target.closest('.drag');if(!h)return;
    if(h.classList.contains('sec-drag')){var sec=h.closest('.tsection');if(sec)sec.setAttribute('draggable','true');}
    else{var item=h.closest('.titem');if(item)item.setAttribute('draggable','true');}
  });
  function clearDraggable(){document.querySelectorAll('[draggable="true"]').forEach(function(el){if(el.classList.contains('titem')||el.classList.contains('tsection'))el.removeAttribute('draggable');});}
  document.getElementById('calendar').addEventListener('dragstart',function(ev){
    var item=ev.target.closest('.titem');
    var sec=ev.target.closest('.tsection');
    if(item&&item.getAttribute('draggable')==='true'){drag={kind:'item',si:+item.dataset.si,ii:+item.dataset.ii};item.classList.add('dragging');ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain','x');}catch(e){}}
    else if(sec&&sec.getAttribute('draggable')==='true'){drag={kind:'section',si:+sec.dataset.si};sec.classList.add('dragging');ev.dataTransfer.effectAllowed='move';try{ev.dataTransfer.setData('text/plain','x');}catch(e){}}
  });
  document.getElementById('calendar').addEventListener('dragend',function(){
    drag=null;clearDropMarks();clearDraggable();
    document.querySelectorAll('.dragging').forEach(function(el){el.classList.remove('dragging');});
  });
  document.getElementById('calendar').addEventListener('dragover',function(ev){
    if(!drag)return;
    if(drag.kind==='item'){
      var over=ev.target.closest('.titem');
      if(!over||+over.dataset.si!==drag.si){return;} // items move within their section
      ev.preventDefault();clearDropMarks();
      over.classList.add(isAfter(ev.clientY,over)?'drop-after':'drop-before');
    } else {
      var sec=ev.target.closest('.tsection');
      if(!sec)return;ev.preventDefault();clearDropMarks();
      sec.classList.add(isAfter(ev.clientY,sec)?'drop-after':'drop-before');
    }
  });
  document.getElementById('calendar').addEventListener('drop',function(ev){
    if(!drag)return;ev.preventDefault();
    if(drag.kind==='item'){
      var over=ev.target.closest('.titem');
      if(over&&+over.dataset.si===drag.si){
        moveWithin(state.todo[drag.si].items,drag.ii,+over.dataset.ii+(isAfter(ev.clientY,over)?1:0));
        paginateTodo(true);
      }
    } else {
      var sec=ev.target.closest('.tsection');
      if(sec){moveWithin(state.todo,drag.si,+sec.dataset.si+(isAfter(ev.clientY,sec)?1:0));paginateTodo(true);}
    }
    drag=null;clearDropMarks();clearDraggable();
  });
  function isAfter(y,el){var r=el.getBoundingClientRect();return y>r.top+r.height/2;}
  function moveWithin(arr,from,toRaw){
    var moved=arr.splice(from,1)[0];
    var to=toRaw>from?toRaw-1:toRaw;
    if(to<0)to=0;if(to>arr.length)to=arr.length;
    arr.splice(to,0,moved);
  }

  /* ---------- day cell ---------- */
  function itemRowHtml(key,idx,it){
    return '<div class="item">'+
      '<div class="it-label" contenteditable="true" spellcheck="false" data-date="'+key+'" data-idx="'+idx+'">'+esc(it.label||'')+'</div>'+

  /* ---------- Save / Open: overwrite ONE csv file in place ----------
     Save remembers the file (File System Access API, Chrome/Edge) so the first
     Save asks where to put relocation-plan.csv and every later Save silently
     overwrites it. Open remembers the opened csv so Save overwrites that one.
     Browsers without the API fall back to a normal download. */
  var fileHandle=null;
  var FS=('showSaveFilePicker' in window);
  var CSV_TYPES=[{description:'Relocation plan',accept:{'text/csv':['.csv']}}];

  function flashSaved(msg){var b=document.getElementById('save'),t='Save';b.textContent=msg||'Saved \u2713';b.disabled=true;setTimeout(function(){b.textContent=t;b.disabled=false;},1200);}
  function applyJSONText(str){
    var snap=snapshot();
    try{
      var obj=JSON.parse(str),s=obj.state||obj;
      if(s.store){for(var k in s.store){var e=s.store[k];if(e&&!e.items){var arr=[];if(e.note||e.amount!=null)arr.push({label:e.note||'',amount:(e.amount!=null?e.amount:null)});s.store[k]={items:arr};}}state.store=s.store;}
      if(s.cardsDue)state.cardsDue=s.cardsDue;
      if(s.banks&&s.banks.length)state.banks=s.banks;
      if(s.credit&&s.credit.length)state.credit=s.credit;
      if(s.owed&&s.owed.length)state.owed=s.owed;
      if(s.todo&&s.todo.length)state.todo=s.todo;
      if(s.reimbAED!=null)state.reimbAED=s.reimbAED;
      if(s.reimbRate!=null)state.reimbRate=s.reimbRate;
      if(typeof s.reimbCur==='string')state.reimbCur=s.reimbCur;
      if(s.currency){state.currency=s.currency;document.getElementById('currency').value=s.currency;}
      if(s.start&&!isNaN(s.start.y)&&s.start.m>=0&&s.start.m<=11)state.start=s.start;
      if(s.count>0)state.count=Math.min(s.count|0,120);
      if(typeof s.docTitle==='string')state.docTitle=s.docTitle;
      if(typeof s.summaryDate==='string')state.summaryDate=s.summaryDate;
      render();
    }catch(e){restore(snap);try{render();}catch(_){}throw e;}
  }
  function loadText(text){
    var t=(text&&text.charCodeAt(0)===0xFEFF)?text.slice(1):text;
    if(/^\s*[\[{]/.test(t))applyJSONText(t);   // legacy JSON plan
    else applyCSV(text);                        // CSV (applyCSV strips its own BOM)
  }
  function downloadCSV(csv){
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=(fileHandle&&fileHandle.name)||'relocation-plan.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  }
  function doSave(){
    var csv='\ufeff'+buildCSV();
    if(FS){
      (async function(){
        try{
          if(!fileHandle)fileHandle=await window.showSaveFilePicker({suggestedName:'relocation-plan.csv',types:CSV_TYPES});
          var w=await fileHandle.createWritable();   // truncates, so a shorter plan overwrites cleanly
          await w.write(csv);await w.close();
          setFileName(fileHandle.name);flashSaved();
        }catch(e){
          if(e&&e.name==='AbortError')return;          // user dismissed the picker
          downloadCSV(csv);flashSaved('Downloaded');   // permission/other failure -> fall back
        }

  }
  function doOpen(){
    if(FS&&window.showOpenFilePicker){
      (async function(){
        try{
          var picked=await window.showOpenFilePicker({types:[{description:'Relocation plan',accept:{'text/csv':['.csv'],'application/json':['.json']}}]});
          var h=picked[0],file=await h.getFile(),text=await file.text();
          loadText(text);

          setFileName(fileHandle?h.name:'');

      })();

    rd.readAsText(f);ev.target.value='';

  /* ---------- CSV export / import (lossless round-trip of the whole plan) ----------
     One flat sheet; each row is self-describing via its `record` tag. Columns:
       record | key | name | amount | due | done | weekday | total
     record=meta          key=field        name=value                              (scalars: start "YYYY-MM", count, currency, docTitle, summaryDate, reimbAmount/reimbRate=amount, reimbCur)
     record=bank/credit/owed               name=label    amount=number
     record=todo_section  key=sectionIndex name=title
     record=todo_item     key=sectionIndex name=text                       done=true/false
     record=day           key=YYYY-MM-DD   name=label    amount=number              weekday=Mon..Sun  total=day sum (both reference-only, ignored on import)
     record=card          key=YYYY-MM      name=card     amount=number   due=text
     EVERY calendar day in the visible range is emitted (empty days too) so the whole
     calendar is visible/editable in a spreadsheet; weekday+total are read-only helpers. */
  var CSV_COLS=['record','key','name','amount','due','done','weekday','total'];
  function csvCell(v){
    if(v==null)return '';
    var s=String(v);
    return /[",\r\n]/.test(s)?('"'+s.replace(/"/g,'""')+'"'):s;
  }
  function csvLine(a){return a.map(csvCell).join(',');}
  // Formula-injection guard: a cell a spreadsheet would execute (leads with = + - @ tab CR)
  // is prefixed with an apostrophe on export and un-prefixed on import — applied to TEXT
  // fields only (never numeric amounts), so the round-trip stays byte-exact.
  function gtext(v){var s=String(v==null?'':v);return /^[=+\-@\t\r]/.test(s)?("'"+s):s;}
  function ungtext(v){var s=String(v==null?'':v);return /^'[=+\-@\t\r]/.test(s)?s.slice(1):s;}
  function dowName(date){ // date = "YYYY-MM-DD"
    var d=new Date(+date.slice(0,4),+date.slice(5,7)-1,+date.slice(8,10));
    return WEEK[(d.getDay()+6)%7];
  }
  function buildCSV(){
    var rows=[CSV_COLS.slice()];
    function row(record,key,name,amount,due,done,weekday,total){
      rows.push([record,
        key==null?'':key,
        gtext(name),
        (amount==null||amount==='')?'':amount,
        gtext(due),
        done==null?'':done,
        weekday==null?'':weekday,
        (total==null||total==='')?'':total]);
    }
    row('meta','start',ymKey(state.start.y,state.start.m));
    row('meta','count',state.count);
    row('meta','currency',state.currency);
    row('meta','docTitle',state.docTitle||'');
    row('meta','summaryDate',state.summaryDate||'');
    row('meta','reimbAmount',null,state.reimbAED);
    row('meta','reimbRate',null,state.reimbRate);
    row('meta','reimbCur',state.reimbCur||'');
    [['banks','bank'],['credit','credit'],['owed','owed']].forEach(function(p){
      state[p[0]].forEach(function(it){row(p[1],'',it.name||'',it.amount);});
    });
    state.todo.forEach(function(sec,si){
      row('todo_section',si,sec.title||'');
      sec.items.forEach(function(it){row('todo_item',si,it.text||'',null,null,it.done?'true':'false');});
    });
    // Every day in the visible range, PLUS any stored day outside it that holds data.
    var dateSet={};
    Object.keys(state.store).forEach(function(d){var e=state.store[d];if(e&&e.items&&e.items.length)dateSet[d]=true;});
    for(var i=0;i<state.count;i++){
      var mm=(state.start.m+i)%12,yy=state.start.y+Math.floor((state.start.m+i)/12),dim=new Date(yy,mm+1,0).getDate();
      for(var d=1;d<=dim;d++)dateSet[iso(yy,mm,d)]=true;
    }
    Object.keys(dateSet).sort().forEach(function(date){
      var items=(state.store[date]&&state.store[date].items)||[],wd=dowName(date);
      if(items.length){items.forEach(function(it,ii){row('day',date,it.label||'',it.amount,'','',wd,(ii===0&&hasPriced(date))?daySum(date):'');});}
      else{row('day',date,'',null,'','',wd,'');} // placeholder so the empty day still appears
    });
    Object.keys(state.cardsDue).sort().forEach(function(ym){
      cardsArr(ym).forEach(function(it){row('card',ym,it.card||'',it.amount,it.due||'');});
    });
    return rows.map(csvLine).join('\r\n')+'\r\n';
  }
  function parseCSV(text){
    if(text.charCodeAt(0)===0xFEFF)text=text.slice(1); // strip UTF-8 BOM (Excel)
    var rows=[],row=[],field='',started=false,i=0,n=text.length,q=false;
    function endField(){row.push(field);field='';started=false;}
    while(i<n){
      var c=text[i];
      if(q){
        if(c==='"'){if(text[i+1]==='"'){field+='"';i+=2;}else{q=false;i++;}}
        else{field+=c;i++;}
        continue;
      }
      if(c==='"'&&!started){q=true;started=true;i++;}              // quote only opens at field start (RFC-4180)
      else if(c===','){endField();i++;}
      else if(c==='\r'){endField();rows.push(row);row=[];i++;if(text[i]==='\n')i++;}
      else if(c==='\n'){endField();rows.push(row);row=[];i++;}
      else{field+=c;started=true;i++;}                             // any other char (incl. a mid-field ") is literal
    }
    if(field!==''||row.length){row.push(field);rows.push(row);}
    return rows;
  }
  function snapshot(){return JSON.parse(JSON.stringify({start:state.start,count:state.count,currency:state.currency,
    docTitle:state.docTitle,summaryDate:state.summaryDate,reimbAED:state.reimbAED,reimbRate:state.reimbRate,reimbCur:state.reimbCur,
    banks:state.banks,credit:state.credit,owed:state.owed,todo:state.todo,store:state.store,cardsDue:state.cardsDue}));}
  function restore(s){state.start=s.start;state.count=s.count;state.currency=s.currency;state.docTitle=s.docTitle;
    state.summaryDate=s.summaryDate;state.reimbAED=s.reimbAED;state.reimbRate=s.reimbRate;state.reimbCur=s.reimbCur;
    state.banks=s.banks;state.credit=s.credit;state.owed=s.owed;state.todo=s.todo;state.store=s.store;state.cardsDue=s.cardsDue;}
  function applyCSV(text){
    var rows=parseCSV(text);
    if(!rows.length)throw new Error('file is empty');
    var header=rows[0].map(function(s){return (s||'').trim().toLowerCase();});
    if(header[0]!=='record')throw new Error('missing "record" header column');
    var ix={};header.forEach(function(h,i){ix[h]=i;});
    function get(r,name){var i=ix[name];return (i==null||r[i]==null)?'':r[i];}
    function num(v){v=String(v==null?'':v).trim();if(v==='')return null;var f=parseFloat(v);return isNaN(f)?null:f;}
    // null = "not present in file" (leave existing value); a present-but-empty cell restores empty.
    var ns={start:null,count:null,currency:null,docTitle:null,summaryDate:null,
            reimbAED:null,reimbRate:null,reimbCur:null,
            banks:[],credit:[],owed:[],secs:{},maxSec:-1,store:{},cardsDue:{}};
    function sec(idx){if(!ns.secs[idx]){ns.secs[idx]={title:'',items:[]};if(idx>ns.maxSec)ns.maxSec=idx;}return ns.secs[idx];}
    for(var r=1;r<rows.length;r++){
      var row=rows[r];
      if(!row.length||row.every(function(c){return c==null||c==='';}))continue;
      var rec=String(get(row,'record')).trim(),
          key=get(row,'key'),name=ungtext(get(row,'name')),
          amount=get(row,'amount'),due=ungtext(get(row,'due')),done=get(row,'done');
      if(rec==='meta'){
        var k=String(key).trim().toLowerCase();
        if(k==='start'){var p=String(name).split('-');if(p.length>=2){var yy=parseInt(p[0],10),mm=parseInt(p[1],10);if(!isNaN(yy)&&!isNaN(mm)&&mm>=1&&mm<=12)ns.start={y:yy,m:mm-1};}}
        else if(k==='count'){var c2=parseInt(name,10);if(!isNaN(c2)&&c2>0)ns.count=Math.min(c2,120);} // clamp so a huge value can't hang the render loop
        else if(k==='currency'){var cu=String(name).trim();if(cu)ns.currency=cu;}
        else if(k==='doctitle'){ns.docTitle=String(name);}
        else if(k==='summarydate'){ns.summaryDate=String(name);}
        else if(k==='reimbamount'){ns.reimbAED=num(amount);}
        else if(k==='reimbrate'){ns.reimbRate=num(amount);}
        else if(k==='reimbcur'){ns.reimbCur=String(name).trim();}
      }
      else if(rec==='bank'){ns.banks.push({name:String(name),amount:num(amount)});}
      else if(rec==='credit'){ns.credit.push({name:String(name),amount:num(amount)});}
      else if(rec==='owed'){ns.owed.push({name:String(name),amount:num(amount)});}
      else if(rec==='todo_section'){var si=parseInt(key,10);if(isNaN(si))si=ns.maxSec+1;sec(si).title=String(name);}
      else if(rec==='todo_item'){var sj=parseInt(key,10);if(isNaN(sj))sj=ns.maxSec<0?0:ns.maxSec;sec(sj).items.push({text:String(name),done:/^\s*true\s*$/i.test(String(done))});}
      else if(rec==='day'){var dk=String(key).trim();if(dk&&(String(name)!==''||num(amount)!=null)){if(!ns.store[dk])ns.store[dk]={items:[]};ns.store[dk].items.push({label:String(name),amount:num(amount)});}} // skip empty-day placeholders
      else if(rec==='card'){var ck=String(key).trim();if(ck){if(!ns.cardsDue[ck])ns.cardsDue[ck]=[];ns.cardsDue[ck].push({card:String(name),due:String(due),amount:num(amount)});}}
    }
    var todo=[];Object.keys(ns.secs).map(Number).sort(function(a,b){return a-b;}).forEach(function(i){todo.push(ns.secs[i]);});
    // Commit atomically: snapshot first, and roll back if anything (incl. render) throws,
    // so a bad import can never leave a half-written / unrenderable state.
    var snap=snapshot();
    try{
      if(ns.start)state.start=ns.start;
      if(ns.count)state.count=ns.count;
      if(ns.currency){state.currency=ns.currency;document.getElementById('currency').value=ns.currency;}
      if(ns.docTitle!=null)state.docTitle=ns.docTitle;
      if(ns.summaryDate!=null)state.summaryDate=ns.summaryDate;
      if(ns.reimbAED!=null)state.reimbAED=ns.reimbAED;
      if(ns.reimbRate!=null)state.reimbRate=ns.reimbRate;
      if(ns.reimbCur!=null)state.reimbCur=ns.reimbCur;
      state.banks=ns.banks.length?ns.banks:[{name:'',amount:null}];
      state.credit=ns.credit.length?ns.credit:[{name:'',amount:null}];
      state.owed=ns.owed.length?ns.owed:[{name:'',amount:null}];
      state.todo=todo;            // unconditional, so an emptied checklist round-trips
      state.store=ns.store;
      state.cardsDue=ns.cardsDue;
      render();
    }catch(e){
      restore(snap);try{render();}catch(_){}   // leave the previous good plan intact and on screen
      throw e;
    }
  }
  document.getElementById('currency').value=state.currency;
  render();
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(function(){paginateTodo(true);});}
  var rsz=null;window.addEventListener('resize',function(){clearTimeout(rsz);rsz=setTimeout(function(){paginateTodo(true);},200);});
})();
</script>
